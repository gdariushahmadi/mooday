<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#512443" />
    <title>Mooday — Offline</title>
    <style>
      :root {
        --plum: #512443;
        --plum-deep: #340a2a;
        --blush: #ffd8ed;
        --bg: #fbf9f7;
        --ink: #1b1c1b;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; }
      body {
        font-family: "Hanken Grotesk", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--ink);
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .card {
        max-width: 420px;
        width: 100%;
        text-align: center;
        background: #fff;
        border: 1px solid #eae8e6;
        border-radius: 24px;
        padding: 40px 28px;
        box-shadow: 0 10px 30px rgba(81, 36, 67, 0.08);
      }
      .badge {
        width: 72px; height: 72px;
        margin: 0 auto 20px;
        border-radius: 18px;
        background: linear-gradient(135deg, #673657, #512443 55%, #3a0e2f);
        display: flex; align-items: center; justify-content: center;
        color: var(--blush);
        font-family: "Bodoni Moda", "Playfair Display", serif;
        font-style: italic;
        font-size: 44px;
        line-height: 1;
      }
      h1 {
        font-family: "Bodoni Moda", "Playfair Display", serif;
        font-style: italic;
        color: var(--plum);
        font-size: 28px;
        margin: 0 0 8px;
        letter-spacing: 0.02em;
      }
      p { color: #4a4a4a; line-height: 1.5; margin: 0 0 24px; }
      button {
        background: var(--plum);
        color: #fff;
        border: 0;
        border-radius: 999px;
        padding: 12px 24px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        letter-spacing: 0.02em;
      }
      button:active { transform: scale(0.97); }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="badge">M</div>
      <h1>You're offline</h1>
      <p>
        Mooday needs a connection to load the latest items. Reconnect and we'll
        bring the feed right back.
      </p>
      <button onclick="location.reload()">Try again</button>
    </div>
  </body>
</html>
