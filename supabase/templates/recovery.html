<!doctype html>
<html lang="en" dir="ltr">
  <body style="margin:0;background:#f8f5f7;font-family:Arial,sans-serif;color:#2d202a">
    <main style="max-width:560px;margin:32px auto;background:#fff;padding:32px;border-radius:16px">
      <h1 style="color:#512443;margin-top:0">Reset your Mooday password</h1>
      <p>Enter this one-time recovery code in Mooday:</p>
      <p style="font-size:32px;letter-spacing:8px;font-weight:700;color:#512443">{{ .Token }}</p>
      <hr style="border:0;border-top:1px solid #eadfe6;margin:28px 0">
      <h2 lang="ar" dir="rtl" style="color:#512443">إعادة تعيين كلمة مرور موداي</h2>
      <p lang="ar" dir="rtl">أدخلي رمز الاسترداد هذا في موداي:</p>
      <p lang="ar" dir="ltr" style="font-size:32px;letter-spacing:8px;font-weight:700;color:#512443">{{ .Token }}</p>
      <p style="font-size:12px;color:#74656f">If you did not request a reset, you can ignore this email.</p>
    </main>
  </body>
</html>
