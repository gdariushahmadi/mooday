name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  verify:
    name: Lint, type-check, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

      - name: Unit tests
        run: npm run test:ci

      - name: Production build
        run: npm run build

  phase-2-integration:
    name: Supabase migration, RLS, and Auth smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Start local Supabase and apply migrations
        run: npm run supabase:start

      - name: Export browser-safe local configuration
        shell: bash
        run: |
          eval "$(npx supabase@2.109.1 status -o env 2>/dev/null)"
          echo "NEXT_PUBLIC_DATA_SOURCE=supabase" >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_SUPABASE_URL=$API_URL" >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=$PUBLISHABLE_KEY" >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_SITE_URL=http://localhost:3000" >> "$GITHUB_ENV"

      - name: Test RLS and live Auth flows
        run: npm run test:phase2:db && npm run test:phase2:smoke

      - name: Build in Supabase mode
        run: npm run build

      - name: Install browser for end-to-end tests
        run: npx playwright install --with-deps chromium

      - name: Test the browser sign-up and OTP journey
        run: npm run test:phase2:e2e

      - name: Stop local Supabase
        if: always()
        run: npm run supabase:stop
